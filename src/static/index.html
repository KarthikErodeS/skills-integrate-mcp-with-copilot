<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-bar">
        <div>
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
        <div class="teacher-controls">
          <span id="teacher-status" class="teacher-status hidden">Teacher: <strong id="teacher-name"></strong></span>
          <button id="logout-btn" class="secondary-btn hidden" type="button">Logout</button>
          <button id="login-toggle" class="icon-btn" type="button" aria-label="Teacher login">👤</button>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Teacher Registration Panel</h3>
        <p class="help-text">Only logged-in teachers can register or unregister students.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <div class="modal-content">
        <h3 id="login-title">Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="teacher-username">Username:</label>
            <input type="text" id="teacher-username" required placeholder="teacher username" />
          </div>
          <div class="form-group">
            <label for="teacher-password">Password:</label>
            <input type="password" id="teacher-password" required placeholder="password" />
          </div>
          <div class="modal-actions">
            <button type="button" id="login-cancel" class="secondary-btn">Cancel</button>
            <button type="submit">Login</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
